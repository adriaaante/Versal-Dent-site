name: Fetch images

# Скачивает изображения по манифесту scripts/images.json и коммитит их.
# Запуск вручную: Actions → "Fetch images" → Run workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Pillow
        run: pip install --quiet pillow
      - name: Download & normalize images
        run: python scripts/fetch_images.py
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/promo/*.webp assets/img/tehnologii/*.webp
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: AI-изображения акций и технологий (auto)"
            git push
          fi
