name: Fetch service images

# Скачивает сгенерированные изображения услуг с CDN и коммитит их в репо.
# Запуск вручную: Actions → "Fetch service images" → Run workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Pillow
        run: pip install --quiet pillow
      - name: Download & normalize images
        run: python scripts/fetch_service_images.py
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/services/*.webp
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: AI-изображения услуг с Higgsfield (auto)"
            git push
          fi
